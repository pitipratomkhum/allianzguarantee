<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ปิติ ประทุมขำ | Financial Advisor</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {margin:0;font-family:'Prompt',sans-serif;background:#0f172a;color:white;}
.container {max-width:1000px;margin:auto;padding:20px;}
.card {background:#1e293b;padding:20px;border-radius:15px;margin-top:20px;}
input,select {width:100%;padding:10px;margin-top:10px;border-radius:8px;border:none;}
.btn {background:#2563eb;padding:12px;border:none;border-radius:10px;color:white;width:100%;margin-top:10px;}
.result {margin-top:15px;background:#0ea5e9;padding:15px;border-radius:10px;color:#000;}
.avatar {width:180px;height:180px;border-radius:50%;object-fit:cover;}
</style>
</head>

<body>
<div class="container">

<div class="card">
  <img src="profile.png" class="avatar">
  <h2>ปิติ ประทุมขำ</h2>
  <p>Financial Advisor</p>
  <p>📞 094-825-9235</p>
</div>

<div class="card">
  <h2>ประเมินเบื้องต้น</h2>
  <input id="name" placeholder="ชื่อ">
  <input id="email" placeholder="Email">
  <input id="phone" placeholder="เบอร์">
  <input id="age" type="number" placeholder="อายุ">
  <input id="income" type="number" placeholder="รายได้">

  <button class="btn" onclick="calc()">วิเคราะห์ + บันทึก</button>
  <div id="result" class="result"></div>
</div>

<div class="card">
  <h2>สุขภาพ (Pro)</h2>
  <select id="room">
    <option value="2000">ห้อง 2000</option>
    <option value="4000">ห้อง 4000</option>
  </select>
  <button class="btn" onclick="calcHealth()">คำนวณ</button>
  <div id="health" class="result"></div>
</div>

<div class="card">
  <h2>สะสมทรัพย์</h2>
  <input id="years" type="number" placeholder="ปี">
  <input id="amount" type="number" placeholder="ออม/ปี">
  <button class="btn" onclick="calcSave()">คำนวณ</button>
  <div id="save" class="result"></div>
</div>

</div>

<script>

// 📊 PRODUCTS
const PRODUCTS = [
 {name:"คุ้มครองล้วน",rate:0.0005},
 {name:"สะสมทรัพย์",rate:0.0009},
 {name:"ยูนิตลิงค์",rate:0.0012}
];

// 🎯 MAIN
function calc(){
 let name=nameEl("name");
 let email=nameEl("email");
 let phone=nameEl("phone");
 let age=val("age");
 let income=val("income");

 let coverage=income*60;
 let best=PRODUCTS[0];
 let premium=coverage*best.rate;

 fetch("https://script.google.com/macros/s/AKfycbxi_OsqkGC8Xc72A7smSO1f00Jrd9obEWa7v26yZXmeupO44kKMBsgmyzVEomgxt73v/exec",{
  method:"POST",
  body:JSON.stringify({name,email,phone,age,income,plan:best.name})
 });

 document.getElementById("result").innerHTML=
 `แผน: ${best.name}<br>เบี้ย: ${premium.toFixed(0)}`;
}

// 🏥 HEALTH
function calcHealth(){
 let age=val("age");
 let room=val("room");
 let base=age<40?12000:20000;
 let premium=base*(room/2000);
 document.getElementById("health").innerHTML=`${premium.toFixed(0)} บาท/ปี`;
}

// 💰 SAVE
function calcSave(){
 let y=val("years");
 let a=val("amount");
 let total=a*y;
 document.getElementById("save").innerHTML=`${total.toLocaleString()} บาท`;
}

// helper
function nameEl(id){return document.getElementById(id).value;}
function val(id){return parseInt(document.getElementById(id).value||0);}

</script>
</body>
</html>
